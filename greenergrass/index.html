<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>greener grass — Deveny Faruque</title>
		<link rel="stylesheet" href="../videopage.css">
	
</head>
<body>

	<div class="frame">
	<iframe
    src="https://player.vimeo.com/video/1191575638?h=4e86bc6026&autoplay=1&loop=1&title=0&byline=0&portrait=0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
</iframe>
	</div>

	<!--
		Set --photo-count to the number of photos you have (1, 2, or 3)
		Place your installation shot filenames in the greenergrass folder
	-->
	<div class="photos">
		<div class="photo"><img src="install-1.jpeg" alt="installation view"></div>
		<div class="photo"><img src="install-2.jpeg" alt="installation view"></div>
		<div class="photo"><img src="install-3.jpeg" alt="installation view"></div>
	</div>

	<!-- Add your text about the work here -->
	<div class="about">
		Your text about the work goes here. A few sentences about the installation context, the space, the experience.
	</div>

	<div class="lightbox" id="lightbox">
		<img id="lightbox-img" src="" alt="">
	</div>

	<a class="back" href="https://www.devenyfaruque.com">← devenyfaruque.com</a>
	<!-- Update title, medium, year -->
	<span class="title">greener grass, video installation, 2023</span>

	<script>
		const lightbox = document.getElementById('lightbox');
		const lightboxImg = document.getElementById('lightbox-img');

		document.querySelectorAll('.photo img').forEach(img => {
			img.parentElement.addEventListener('click', function() {
				lightboxImg.src = img.src;
				lightbox.classList.add('active');
			});
		});

		lightbox.addEventListener('click', function() {
			lightbox.classList.remove('active');
		});
	</script>

</body>
</html>
